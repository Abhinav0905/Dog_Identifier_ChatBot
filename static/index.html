<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharamsala Animal Rescue</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">
        <span class="header-icon">&#128062;</span>
        <div>
            <h1>Dharamsala Animal Rescue</h1>
            <div class="subtitle">Community-First Rescue Assistant</div>
        </div>
        <div class="header-right">
            <a href="/admin.html">Admin</a>
            <a href="/health">Status</a>
        </div>
    </div>

    <div class="landing">
        <button class="open-chat-btn" id="openChatBtn">Start Chat</button>
    </div>

    <div class="chat-container hidden">
        <div class="chat-toolbar">
            <button class="minimize-btn" id="minimizeBtn" title="Minimize chat">&#8722;</button>
        </div>
        <div class="chat-messages" id="chatMessages">
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="input-area">
            <div class="upload-preview" id="uploadPreview">
                <img id="previewImg" src="" alt="Preview">
                <span id="fileName"></span>
                <button class="remove-btn" id="removeBtn" title="Remove image">&#10005;</button>
            </div>
            <div class="location-bar" id="locationBar">
                &#128205; Location: <span id="locationText">Not shared</span>
            </div>
            <div class="map-actions" id="mapActions">
                <button class="map-action-btn" id="vetMapBtn">Rescue nearby</button>
                <button class="map-action-btn" id="rescueMapBtn">Animal help nearby</button>
            </div>
            <div class="input-row">
                <button class="btn-icon" id="locationBtn" title="Share location">
                    &#128205;
                </button>
                <button class="btn-icon" id="cameraBtn" title="Upload image">
                    &#128247;
                </button>

                <input type="file" id="fileInput" class="file-input" accept="image/*,.heic,.heif">
                <textarea id="messageInput" placeholder="Describe the situation or ask a rescue question..." rows="1"></textarea>
                <button class="btn btn-primary" id="sendBtn">Send</button>
            </div>
        </div>

        <div class="status-bar">
            Prototype v1.0 &mdash; Not a substitute for professional veterinary care
        </div>
    </div>

    <script src="/static/app.js?v=15"></script>
</body>
</html>
